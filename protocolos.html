<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocolos</title>

<style>
body { font-family:Arial; margin:0; background:#f4f6f9; }

header {
    background:#0B3C49;
    color:white;
    padding:30px;
    text-align:center;
}

.container {
    width:90%;
    max-width:1000px;
    margin:40px auto;
}

.card {
    background:white;
    padding:25px;
    margin-bottom:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
button {
    padding:10px 15px;
    background:#0B3C49;
    color:white;
    border:none;
    border-radius:6px;
}
</style>
</head>

<body>

<header>
<h1>Protocolos Técnicos</h1>
</header>

<div class="container">

<div class="card">
<h3>Protocolo de Administração IM</h3>
<p>Passo a passo padronizado para aplicação intramuscular.</p>
<button>Baixar PDF</button>
</div>

<div class="card">
<h3>Protocolo de Atendimento em Crise</h3>
<p>Condutas iniciais e abordagem segura.</p>
<button>Baixar PDF</button>
</div>

</div>

</body>
</html>
