<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prontuário do Paciente</title>

<script>
if(localStorage.getItem("logado") !== "true"){
    window.location.href = "login.html";
}

function salvarProntuario(){

let nome = document.getElementById("nome").value;
let nascimento = document.getElementById("nascimento").value;
let queixa = document.getElementById("queixa").value;
let evolucao = document.getElementById("evolucao").value;

let prontuario = {
    nome,
    nascimento,
    queixa,
    evolucao,
    profissional: localStorage.getItem("usuario"),
    data: new Date().toLocaleString()
};

localStorage.setItem("prontuarioAtual", JSON.stringify(prontuario));

alert("Prontuário salvo com sucesso!");
}

function visualizarProntuario(){

let dados = JSON.parse(localStorage.getItem("prontuarioAtual"));

if(!dados){
    alert("Nenhum prontuário salvo.");
    return;
}

document.getElementById("resultado").innerHTML = `
<h3>Prontuário Registrado</h3>
<p><strong>Paciente:</strong> ${dados.nome}</p>
<p><strong>Nascimento:</strong> ${dados.nascimento}</p>
<p><strong>Queixa:</strong> ${dados.queixa}</p>
<p><strong>Evolução:</strong> ${dados.evolucao}</p>
<p><strong>Profissional:</strong> ${dados.profissional}</p>
<p><strong>Data:</strong> ${dados.data}</p>
<button onclick="window.print()">Imprimir</button>
`;
}
</script>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#0B3C49;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

input, textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#0B3C49;
color:white;
border:none;
border-radius:6px;
margin-right:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>Cadastro de Prontuário</h2>
<button onclick="window.location.href='painel.html'">
Voltar ao Painel
</button>
</header>

<div class="container">

<label>Nome do Paciente</label>
<input type="text" id="nome">

<label>Data de Nascimento</label>
<input type="date" id="nascimento">

<label>Queixa Principal</label>
<textarea id="queixa"></textarea>

<label>Evolução / Conduta</label>
<textarea id="evolucao"></textarea>

<button onclick="salvarProntuario()">Salvar</button>
<button onclick="visualizarProntuario()">Visualizar</button>

<div id="resultado" style="margin-top:30px;"></div>

</div>

</body>
</html>
