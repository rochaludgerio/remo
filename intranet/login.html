<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intranet | Ludgerio Rocha</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #0B3C49;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

.login-box h2 {
    margin-bottom: 10px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #0B3C49;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #145b6e;
}
</style>

<script>
function login(){

let usuario = document.getElementById("usuario").value;
let senha = document.getElementById("senha").value;

/* Usuários permitidos */
let usuariosPermitidos = ["ludgerio", "rocha"];
let senhaCorreta = "12378955";

if(usuariosPermitidos.includes(usuario) && senha === senhaCorreta){
    localStorage.setItem("logado", "true");
    localStorage.setItem("usuario", usuario);
    window.location.href = "painel.html";
}else{
    alert("Usuário ou senha incorretos");
}

}
</script>

</head>

<body>

<div class="login-box">
    <h2>Intranet</h2>
    <p>Portal Interno de Protocolos</p>

    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>
</div>

</body>
</html>
